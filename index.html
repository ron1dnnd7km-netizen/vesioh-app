<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMS Virtual Code</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  :root {
    --bg-primary: #f6f5f1;
    --bg-secondary: #ffffff;
    --bg-card: #ffffff;
    --bg-card-hover: #fafaf8;
    --bg-sidebar: #eeece6;
    --border: #e2e0d8;
    --border-active: #0d9b7a;
    --accent: #0d9b7a;
    --accent-dim: rgba(13,155,122,0.08);
    --accent-glow: rgba(13,155,122,0.15);
    --text-primary: #1a1c1e;
    --text-secondary: #5f6368;
    --text-muted: #9aa0a6;
    --danger: #d93025;
    --warning: #d48806;
    --success: #0d9b7a;
    --info: #1a73e8;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
    --shadow-lg: 0 8px 30px rgba(0,0,0,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 背景纹理 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 800px 600px at 90% 10%, rgba(13,155,122,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 600px 500px at 10% 80%, rgba(26,115,232,0.03) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* 顶部导航 */
  .top-nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 60px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    z-index: 100;
    box-shadow: var(--shadow-sm);
  }

  .nav-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: -0.5px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent), #087a60);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: #fff;
    box-shadow: 0 2px 8px var(--accent-glow);
  }

  .logo span { color: var(--accent); }

  .nav-links {
    display: flex;
    gap: 4px;
    margin-left: 32px;
  }

  .nav-link {
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    background: none;
    font-family: inherit;
  }
  .nav-link:hover { color: var(--text-primary); background: rgba(0,0,0,0.03); }
  .nav-link.active { color: var(--accent); background: var(--accent-dim); }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .balance-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: #f6f7ff;
    border: 1px solid rgba(29, 52, 94, 0.08);
    border-radius: 22px;
    font-size: 13px;
    font-weight: 700;
    color: #1f2b3d;
    cursor: pointer;
  }
  .balance-badge i { font-size: 14px; color: var(--accent); }

  .language-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    border: 1px solid rgba(29, 52, 94, 0.12);
    background: #ffffff;
    color: #1f2b3d;
    border-radius: 16px;
    padding: 8px 12px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }
  .language-btn:hover {
    background: #f5f7ff;
    border-color: rgba(29, 52, 94, 0.18);
  }
  .language-flag {
    font-size: 16px;
  }
  .language-label {
    font-size: 13px;
    font-weight: 600;
  }

  .language-menu {
    position: relative;
  }

  .language-dropdown {
    position: absolute;
    top: 100%;
    right: 0;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: var(--shadow-md);
    padding: 8px 0;
    min-width: 140px;
    display: none;
    z-index: 200;
    margin-top: 4px;
  }
  .language-dropdown button {
    width: 100%;
    padding: 10px 16px;
    background: none;
    border: none;
    text-align: left;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-primary);
    transition: background 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .language-dropdown button:hover {
    background: var(--bg-card-hover);
  }
  .language-dropdown button span {
    font-size: 16px;
  }

  .user-info {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 8px;
    transition: background 0.2s;
  }
  .user-info:hover { background: rgba(0,0,0,0.03); }

  .user-avatar {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
  }

  .user-email {
    font-size: 12px;
    color: var(--text-secondary);
    max-width: 160px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .notification-btn {
    position: relative;
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }
  .notification-btn:hover { color: var(--text-primary); border-color: var(--text-muted); background: rgba(0,0,0,0.02); }
  .notification-btn .dot {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 7px;
    height: 7px;
    background: var(--danger);
    border-radius: 50%;
    border: 2px solid #fff;
  }

  /* 主布局 */
  .main-layout {
    display: flex;
    margin-top: 60px;
    min-height: calc(100vh - 60px);
    position: relative;
    z-index: 1;
  }

  /* 侧边栏 */
  .sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    padding: 20px 0;
    overflow-y: auto;
    height: calc(100vh - 60px);
    position: sticky;
    top: 60px;
  }

  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .sidebar-section {
    padding: 0 16px;
    margin-bottom: 24px;
  }

  .sidebar-title {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    margin-bottom: 12px;
    padding: 0 8px;
  }

  .service-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 2px;
  }
  .service-item:hover { background: rgba(255,255,255,0.6); }
  .service-item.active { background: #fff; box-shadow: var(--shadow-sm); }

  .service-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }

  .service-icon.fb { background: rgba(24,119,242,0.1); color: #1877f2; }
  .service-icon.fiverr { background: rgba(0,175,80,0.1); color: #00af50; }
  .service-icon.wa { background: rgba(37,211,102,0.1); color: #25d366; }
  .service-icon.telegram { background: rgba(36,161,222,0.1); color: #24a1de; }
  .service-icon.twitter { background: rgba(29,161,242,0.1); color: #1da1f2; }
  .service-icon.amazon { background: rgba(255,153,0,0.1); color: #e68a00; }
  .service-icon.google { background: rgba(66,133,244,0.1); color: #4285f4; }
  .service-icon.instagram { background: rgba(225,48,108,0.1); color: #e1306c; }
  .service-icon.tiktok { background: rgba(255,0,80,0.08); color: #cc0044; }
  .service-icon.discord { background: rgba(88,101,242,0.1); color: #5865f2; }
  .service-icon.microsoft { background: rgba(0,120,212,0.1); color: #0078d4; }
  .service-icon.uber { background: rgba(0,0,0,0.06); color: #333; }
  .service-icon.paypal { background: rgba(0,48,135,0.1); color: #003087; }
  .service-icon.lyft { background: rgba(255,0,80,0.06); color: #cc0044; }
  .service-icon.steam { background: rgba(102,192,244,0.1); color: #4a90b8; }
  .service-icon.other { background: rgba(0,0,0,0.05); color: var(--text-secondary); }

  .service-info { flex: 1; min-width: 0; }
  .service-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .service-region {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .service-price {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    white-space: nowrap;
  }

  /* 搜索框 */
  .search-box {
    padding: 0 16px;
    margin-bottom: 20px;
  }

  .search-input-wrap {
    position: relative;
  }

  .search-input-wrap i {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 13px;
  }

  .search-input {
    width: 100%;
    padding: 10px 12px 10px 36px;
    background: rgba(255,255,255,0.7);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-primary);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: all 0.2s;
  }
  .search-input::placeholder { color: var(--text-muted); }
  .search-input:focus { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 3px var(--accent-dim); }

  /* 主内容区 */
  .main-content {
    flex: 1;
    padding: 24px 28px;
    overflow-y: auto;
  }

  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .page-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .page-actions {
    display: flex;
    gap: 10px;
  }

  .btn {
    padding: 9px 18px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #087a60);
    color: #fff;
    box-shadow: 0 2px 8px var(--accent-glow);
  }
  .btn-primary:hover { box-shadow: 0 4px 16px var(--accent-glow); transform: translateY(-1px); }

  .btn-secondary {
    background: #fff;
    color: var(--text-secondary);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
  }
  .btn-secondary:hover { background: var(--bg-primary); color: var(--text-primary); }

  /* 统计卡片 */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    transition: all 0.3s;
    box-shadow: var(--shadow-sm);
  }
  .stat-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }

  .stat-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .stat-value {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -1px;
  }
  .stat-value.green { color: var(--accent); }
  .stat-value.blue { color: var(--info); }
  .stat-value.yellow { color: var(--warning); }
  .stat-value.red { color: var(--danger); }

  .stat-change {
    font-size: 11px;
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .stat-change.up { color: var(--accent); }
  .stat-change.down { color: var(--danger); }

  /* 活跃号码区域 */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .section-title {
    font-size: 16px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title .count-badge {
    background: var(--accent-dim);
    color: var(--accent);
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
  }

  .active-numbers {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 32px;
  }

  .number-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }
  .number-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 3px;
    height: 100%;
    border-radius: 3px 0 0 3px;
  }
  .number-card.waiting::before { background: var(--warning); }
  .number-card.received::before { background: var(--accent); }
  .number-card.expired::before { background: var(--danger); }

  .number-card:hover { box-shadow: var(--shadow-md); }

  .number-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .number-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .number-service-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .number-service-name {
    font-size: 15px;
    font-weight: 600;
  }
  .number-region-tag {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 3px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .number-right {
    text-align: right;
  }

  .number-phone {
    font-family: 'JetBrains Mono', monospace;
    font-size: 17px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: 0.5px;
  }

  .number-timer {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
    justify-content: flex-end;
  }
  .number-timer.waiting { color: var(--warning); }
  .number-timer.received { color: var(--accent); }
  .number-timer.expired { color: var(--danger); }

  .timer-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    animation: pulse-dot 1.5s infinite;
  }
  .waiting .timer-dot { background: var(--warning); }
  .received .timer-dot { background: var(--accent); animation: none; }
  .expired .timer-dot { background: var(--danger); animation: none; }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  .number-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .number-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 500;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  .status-dot.waiting { background: var(--warning); box-shadow: 0 0 8px rgba(212,136,6,0.3); }
  .status-dot.received { background: var(--accent); box-shadow: 0 0 8px rgba(13,155,122,0.3); }
  .status-dot.expired { background: var(--danger); }
  .status-text.waiting { color: var(--warning); }
  .status-text.received { color: var(--accent); }
  .status-text.expired { color: var(--danger); }

  .number-cost {
    font-size: 12px;
    color: var(--text-muted);
  }

  .number-actions {
    display: flex;
    gap: 8px;
  }

  .btn-sm {
    padding: 6px 12px;
    font-size: 11px;
    border-radius: 8px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .btn-sm.copy {
    background: var(--accent-dim);
    color: var(--accent);
  }
  .btn-sm.copy:hover { background: rgba(13,155,122,0.15); }
  .btn-sm.cancel {
    background: rgba(217,48,37,0.06);
    color: var(--danger);
  }
  .btn-sm.cancel:hover { background: rgba(217,48,37,0.12); }
  .btn-sm.refresh {
    background: rgba(26,115,232,0.06);
    color: var(--info);
  }
  .btn-sm.refresh:hover { background: rgba(26,115,232,0.12); }

  /* 短信内容展示 */
  .sms-content {
    margin-top: 12px;
    background: linear-gradient(135deg, rgba(13,155,122,0.04), rgba(13,155,122,0.08));
    border: 1px solid rgba(13,155,122,0.12);
    border-radius: 10px;
    padding: 14px 16px;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .sms-code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 4px;
    text-align: center;
    padding: 8px 0;
  }

  .sms-text {
    font-size: 12px;
    color: var(--text-secondary);
    text-align: center;
    margin-top: 4px;
    line-height: 1.5;
  }

  .sms-time {
    font-size: 10px;
    color: var(--text-muted);
    text-align: center;
    margin-top: 8px;
  }

  /* 空状态 */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state i {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.25;
  }
  .empty-state p {
    font-size: 14px;
    margin-top: 8px;
  }

  /* 弹窗 */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(6px);
    z-index: 200;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.2s;
  }
  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 20px;
    width: 520px;
    max-width: 90vw;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
    animation: modalIn 0.3s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    padding: 24px 24px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-title {
    font-size: 18px;
    font-weight: 700;
  }

  .modal-close {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: rgba(0,0,0,0.04);
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-close:hover { background: rgba(217,48,37,0.08); color: var(--danger); }

  .modal-body { padding: 20px 24px 24px; }

  .form-group {
    margin-bottom: 18px;
  }

  .form-label {
    display: block;

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function generatePhone(prefix) {

  return `${prefix} ${area} ${mid} ${last}`;
}

  const colorMap = { success: 'var(--accent)', error: 'var(--danger)', info: 'var(--info)' };
  toast.innerHTML = `<i class="fas ${iconMap[type]}" style="color:${colorMap[type]}"></i> ${message}`;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

    social: document.getElementById('socialList'),
    ecommerce: document.getElementById('ecommerceList'),
  };

  Object.values(groups).forEach(g => g.innerHTML = '');

        <div class="stat-change up"><i class="fas fa-clock"></i> In progress</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Codes Received</div>
        <div class="stat-value blue">${activeNumbers.filter(n => n.status === 'received').length}</div>
        <div class="stat-change up"><i class="fas fa-check"></i> Today</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Expired</div>
        <div class="stat-value red">${activeNumbers.filter(n => n.status === 'expired').length}</div>
        <div class="stat-change down"><i class="fas fa-times"></i> Timed out</div>
      </div>
    </div>

    <div class="section-header">
      <div class="section-title">
        Number List
        <span class="count-badge">${filtered.length}</span>
      </div>
      <div class="filter-tabs">
        <button class="filter-tab ${currentFilter === 'all' ? 'active' : ''}" onclick="setFilter('all')">All</button>
        <button class="filter-tab ${currentFilter === 'waiting' ? 'active' : ''}" onclick="setFilter('waiting')">Waiting</button>
        <button class="filter-tab ${currentFilter === 'received' ? 'active' : ''}" onclick="setFilter('received')">Received</button>
        <button class="filter-tab ${currentFilter === 'expired' ? 'active' : ''}" onclick="setFilter('expired')">Expired</button>
      </div>
    </div>

    <div class="active-numbers" id="activeNumbersList">
      ${filtered.length === 0 ? `
        <div class="empty-state">
          <i class="fas fa-inbox"></i>
          <h3>No numbers found</h3>
          <p>Get a new virtual number to receive SMS codes</p>
        </div>
      ` : filtered.map(n => renderNumberCard(n)).join('')}
    </div>
  `;
}

function renderNumberCard(n) {
  const statusTexts = {
    waiting: 'Waiting for SMS...',
    received: 'Code received',
    expired: 'Number expired'
  };

  const smsBlock = n.status === 'received' && n.code ? `
    <div class="sms-content">
      <div class="sms-code">${n.code}</div>
      <div class="sms-text">${n.smsText || 'Your verification code is ' + n.code}</div>
      <div class="sms-time"><i class="fas fa-clock"></i> Received ${n.receivedAt}</div>
    </div>
  ` : '';

  return `
    <div class="number-card ${n.status}" id="card-${n.id}">
      <div class="number-top">
        <div class="number-left">
          <div class="number-service-icon ${n.service.iconClass}">
            <i class="${n.service.icon}"></i>
          </div>
          <div>
            <div class="number-service-name">${n.service.name}</div>
            <div class="number-region-tag">
              <i class="fas fa-globe"></i> ${n.service.region}
            </div>
          </div>
        </div>
        <div class="number-right">
          <div class="number-phone">${n.phone}</div>
          <div class="number-timer ${n.status}">
            ${n.status === 'expired' ? '<i class="fas fa-times-circle"></i> Expired' :
              `<span class="timer-dot"></span> <span id="timer-${n.id}">${formatTime(n.timeLeft)}</span>`}
          </div>
        </div>
      </div>
      ${smsBlock}
      <div class="timer-bar">
        <div class="timer-bar-fill" style="width: ${n.status === 'expired' ? 0 : (n.timeLeft / n.totalTime * 100)}%"></div>
      </div>
      <div class="number-bottom">
        <div class="number-status">
          <span class="status-dot ${n.status}"></span>
          <span class="status-text ${n.status}">${statusTexts[n.status]}</span>
          <span style="color:var(--text-muted); margin-left: 8px; font-size: 11px;">Cost: $${n.cost.toFixed(2)}</span>
        </div>
        <div class="number-actions">
          <button class="btn-sm copy" onclick="copyNumber('${n.phone}')"><i class="fas fa-copy"></i> Copy</button>
          ${n.status === 'waiting' ? `<button class="btn-sm cancel" onclick="cancelNumber(${n.id})"><i class="fas fa-times"></i> Cancel</button>` : ''}
          ${n.status === 'expired' ? `<button class="btn-sm refresh" onclick="refreshNumber(${n.id})"><i class="fas fa-redo"></i> Retry</button>` : ''}
        </div>
      </div>
    </div>
  `;
}

function toggleFaq(el) {
  const answer = el.querySelector('.faq-answer');
  const icon = el.querySelector('.fa-chevron-down');
  if (!answer.style.maxHeight || answer.style.maxHeight === '0px') {
    answer.style.maxHeight = '200px';
    icon.style.transform = 'rotate(180deg)';
  } else {
    answer.style.maxHeight = '0px';
    icon.style.transform = 'rotate(0)';
  }
}

// ==================== 弹窗逻辑 ====================
function openModal(presetService = null) {
  const overlay = document.getElementById('modalOverlay');
  const serviceSelect = document.getElementById('modalService');
  const countrySelect = document.getElementById('modalCountry');

  const uniqueServices = [];
  const seen = new Set();
  services.forEach(s => {
    if (!seen.has(s.name)) { seen.add(s.name); uniqueServices.push(s); }
  });

  serviceSelect.innerHTML = '<option value="">Select a service...</option>' +
    uniqueServices.map(s => `<option value="${s.name}" ${presetService && presetService.name === s.name ? 'selected' : ''}>${s.name}</option>`).join('');

  countrySelect.innerHTML = '<option value="">Select country...</option>' +
    countries.map(c => `<option value="${c.code}" ${presetService && presetService.country === c.code ? 'selected' : ''}>${c.flag} ${c.name}</option>`).join('');

  selectedService = presetService;
  selectedCountry = presetService ? countries.find(c => c.code === presetService.country) : null;
  selectedNumberIdx = null;

  if (presetService) {
    generateNumberOptions();
  } else {
    document.getElementById('numberOptions').innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 20px; color: var(--text-muted); font-size: 13px;">Select a service and country first</div>';
  }

  overlay.classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

function generateNumberOptions() {
  if (!selectedService || !selectedCountry) return;
  const container = document.getElementById('numberOptions');
  const prefix = selectedCountry.prefix;
  const nums = [];
  for (let i = 0; i < 4; i++) nums.push(generatePhone(prefix));

  container.innerHTML = nums.map((num, idx) => `
    <div class="number-option" onclick="selectNumberOption(${idx}, this)" data-phone="${num}">
      <div class="phone">${num}</div>
      <div class="price">$${selectedService.price.toFixed(2)}</div>
    </div>
  `).join('');
}

function selectNumberOption(idx, el) {
  document.querySelectorAll('.number-option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  selectedNumberIdx = idx;
}

document.getElementById('modalService').addEventListener('change', function() {
  selectedService = services.find(s => s.name === this.value);
  if (selectedService && selectedCountry) generateNumberOptions();
});

document.getElementById('modalCountry').addEventListener('change', function() {
  selectedCountry = countries.find(c => c.code === this.value);
  if (selectedService && selectedCountry) generateNumberOptions();
});

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalCancel').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.getElementById('modalConfirm').addEventListener('click', function() {
  if (!selectedService || !selectedCountry || selectedNumberIdx === null) {
    showToast('Please select a service, country and number', 'error');
    return;
  }

  const phoneEl = document.querySelectorAll('.number-option')[selectedNumberIdx];
  const phone = phoneEl.dataset.phone;

  if (balance < selectedService.price) {
    showToast('Insufficient balance', 'error');
    return;
  }

  updateBalance(-selectedService.price);

  const newNumber = {
    id: Date.now(),
    service: selectedService,
    phone: phone,
    status: 'waiting',
    timeLeft: 1200,
    totalTime: 1200,
    cost: selectedService.price,
    code: null,
    smsText: null,
  };

  activeNumbers.unshift(newNumber);
  closeModal();
  renderMainContent();
  showToast(`Number ${phone} activated for ${selectedService.name}`, 'success');
  simulateSmsReception(newNumber.id);
});

// ==================== 号码操作 ====================
function copyNumber(phone) {
  navigator.clipboard.writeText(phone.replace(/\s/g, '')).then(() => {
    showToast('Number copied to clipboard', 'success');
  }).catch(() => {
    showToast('Copy failed', 'error');
  });
}

function cancelNumber(id) {
  const idx = activeNumbers.findIndex(n => n.id === id);
  if (idx > -1) {
    updateBalance(activeNumbers[idx].cost);
    activeNumbers.splice(idx, 1);
    renderMainContent();
    showToast('Number cancelled, balance refunded', 'info');
  }
}

function refreshNumber(id) {
  const n = activeNumbers.find(n => n.id === id);
  if (n) {
    n.status = 'waiting';
    n.timeLeft = 1200;
    n.code = null;
    n.smsText = null;
    renderMainContent();
    showToast('Number refreshed, waiting for SMS...', 'info');
    simulateSmsReception(id);
  }
}

function refreshAllNumbers() {
  showToast('All numbers refreshed', 'info');
  renderMainContent();
}

function setFilter(filter) {
  currentFilter = filter;
  renderMainContent();
}

// ==================== 模拟短信接收 ====================
function simulateSmsReception(numberId) {
  const delay = 5000 + Math.random() * 15000;
  setTimeout(() => {
    const n = activeNumbers.find(n => n.id === numberId);
    if (n && n.status === 'waiting') {
      const code = generateCode();
      n.status = 'received';
      n.code = code;
      n.receivedAt = 'just now';
      n.smsText = `Your ${n.service.name} verification code is ${code}. Do not share it with anyone.`;

      historyData.unshift({
        service: n.service.name,
        region: n.service.country,
        phone: n.phone,
        code: code,
        status: 'success',
        time: 'just now',
        cost: n.cost,
      });

      renderMainContent();
      showToast(`SMS code received for ${n.service.name}: ${code}`, 'success');
    }
  }, delay);
}

// ==================== 计时器 ====================
setInterval(() => {
  let needsRender = false;
  activeNumbers.forEach(n => {
    if (n.status === 'waiting' && n.timeLeft > 0) {
      n.timeLeft--;
      const timerEl = document.getElementById(`timer-${n.id}`);
      if (timerEl) timerEl.textContent = formatTime(n.timeLeft);

      const card = document.getElementById(`card-${n.id}`);
      if (card) {
        const bar = card.querySelector('.timer-bar-fill');
        if (bar) bar.style.width = (n.timeLeft / n.totalTime * 100) + '%';
      }

      if (n.timeLeft <= 0) {
        n.status = 'expired';
        updateBalance(n.cost);
        needsRender = true;
        showToast(`Number ${n.phone} expired, balance refunded`, 'error');

        historyData.unshift({
          service: n.service.name,
          region: n.service.country,
          phone: n.phone,
          code: null,
          status: 'failed',
          time: 'just now',
          cost: n.cost,
        });
      }
    }
  });
  if (needsRender) renderMainContent();
}, 1000);

// ==================== 导航 ====================
document.querySelectorAll('.nav-link').forEach(link => {
  link.addEventListener('click', function() {
    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
    this.classList.add('active');
    currentPage = this.dataset.page;
    renderMainContent();
  });
});

// ==================== 搜索 ====================
document.getElementById('serviceSearch').addEventListener('input', function() {
  renderSidebar(this.value);
});

// ==================== 键盘 ====================
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

// ==================== 初始化 ====================
renderSidebar();
renderMainContent();

activeNumbers.filter(n => n.status === 'waiting').forEach(n => {
  simulateSmsReception(n.id);
});
</script>
