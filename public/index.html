<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMS Virtual Code</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- AUTH PAGES: Landing, Login, Signup render here -->
  <div id="authPages"></div>

  <!-- APP PAGES: Dashboard renders here (hidden until login) -->
  <div id="appPages" style="display:none;">

    <!-- Top Nav -->
    <nav class="top-nav">
      <div class="nav-left">
        <div class="logo">
          <div class="logo-icon"><i class="fas fa-comment-dots"></i></div>
          SMS Virtual <span>Code</span>
        </div>
        <div class="nav-links">
          <button class="nav-link active" data-page="numbers">Numbers</button>
          <button class="nav-link" data-page="history">History</button>
          <button class="nav-link" data-page="pricing">Pricing</button>
          <button class="nav-link" data-page="api">API</button>
          <button class="nav-link" data-page="help">Help</button>
          <button class="nav-link" data-page="deposit" style="color:var(--accent);"><i class="fas fa-plus" style="font-size:10px;margin-right:4px;"></i> Add Funds</button>
        </div>
      </div>
      <div class="nav-right">
        <button class="notification-btn" aria-label="Notifications">
          <i class="fas fa-bell"></i>
          <span class="dot"></span>
        </button>
        <div class="balance-badge" style="cursor:pointer;" onclick="document.querySelectorAll('.nav-link').forEach(function(l){l.classList.remove('active')});document.querySelector('[data-page=deposit]').classList.add('active');currentPage='deposit';renderMainContent();">
      <i class="fas fa-coins"></i>
     <span id="balanceAmount">0.00</span>
     </div>
        <div class="user-info">
          <div class="user-avatar" id="userAvatarDisplay">AS</div>
          <span class="user-email" id="userEmailDisplay">user@email.com</span>
        </div>
        <button class="btn-sm cancel" onclick="logout()" style="font-size:12px;padding:6px 12px;"><i class="fas fa-sign-out-alt"></i> Logout</button>
      </div>
    </nav>

    <!-- Main Layout -->
    <div class="main-layout">
      <aside class="sidebar">
        <div class="search-box">
          <div class="search-input-wrap">
            <i class="fas fa-search"></i>
            <input type="text" class="search-input" placeholder="Search services..." id="serviceSearch" aria-label="Search services">
          </div>
        </div>
        <div class="sidebar-section">
          <div class="sidebar-title">Recommended</div>
          <div id="recommendedList"></div>
        </div>
        <div class="sidebar-section">
          <div class="sidebar-title">Popular Services</div>
          <div id="popularList"></div>
        </div>
        <div class="sidebar-section">
          <div class="sidebar-title">Social Media</div>
          <div id="socialList"></div>
        </div>
        <div class="sidebar-section">
          <div class="sidebar-title">E-Commerce</div>
          <div id="ecommerceList"></div>
        </div>
      </aside>
      <main class="main-content" id="mainContent"></main>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h3 class="modal-title">Get Virtual Number</h3>
        <button class="modal-close" id="modalClose" aria-label="Close"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Service</label>
          <select class="form-select" id="modalService"><option value="">Select a service...</option></select>
          <div class="custom-service-input" id="customServiceInput" style="display:none;margin-top:12px;">
            <input type="text" class="form-input" id="customServiceName" placeholder="Enter service name (e.g., MyApp, CustomService)" maxlength="50">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Country / Region</label>
          <select class="form-select" id="modalCountry"><option value="">Select country...</option></select>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Scripts: order matters -->
  <script src="js/data.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
